name: Build and Deploy Unity WebGL

on: 
  push:
    branches:
      - main
  workflow_dispatch:
  
concurrency:
  group: ${{ github.workflow }} -${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build: 
    name: Build Unity WebGL
    runs-on: ubuntu-latest

    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Validate Unity credentials
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        run: |
          if [ -z "$UNITY_LICENSE" ] && [ -z "$UNITY_SERIAL" ]; then
            echo "Missing Unity credentials. Set UNITY_LICENSE (recommended for Personal) or UNITY_SERIAL in repository secrets."
            exit 1
          fi

      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env: 
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          targetPlatform: WebGL
          buildsPath: builds

      - name: Set artifact name
        id: set-artifact-name
        run: echo "name=WebGL-Build-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload WebGL Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: builds/WebGL
          retention-days: 7
          if-no-files-found: error
    
  deploy:    
      name: Deploy to GitHub Pages
      needs: build
      runs-on: ubuntu-latest

      permissions:
        pages: write
        id-token: write

      environment:
        name: github-pages
        url: ${{ steps.deploy.outputs.page_url }}

      steps:
        - name: Download WebGL Build
          uses: actions/download-artifact@v4
          with:
            name: ${{ needs.build.outputs.artifact-name }}
            path: ./game

        - name: Prepare Pages content
          run: |
            set -e
            mkdir -p ./pages

            if [ -f ./game/index.html ]; then
              cp -R ./game/. ./pages
            elif [ -f ./game/WebGL/index.html ]; then
              cp -R ./game/WebGL/. ./pages
            elif [ -f ./game/builds/WebGL/index.html ]; then
              cp -R ./game/builds/WebGL/. ./pages
            else
              echo "index.html not found in downloaded artifact"
              find ./game -maxdepth 5 -type f | sort
              exit 1
            fi

            test -f ./pages/index.html

        - name: Upload to GitHub pages artifact store
          uses: actions/upload-pages-artifact@v4
          with:
            name: ${{ env.PAGES_ARTIFACT_NAME }}
            path: ./pages

        - name: Deploy to GitHub Pages
          id: deploy
          uses: actions/deploy-pages@v4
          with:
            artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}

        - name: Display deployment URL
          run: |
            echo "Game is live at"
            echo "${{ steps.deploy.outputs.page_url }}"
